<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle Dr. Smile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR NAV */
        nav { width: 80px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        nav button { background: none; border: none; color: #666; font-size: 1.5rem; margin-bottom: 30px; cursor: pointer; transition: 0.3s; }
        nav button.active { color: #00e5ff; }

        /* CONTENT AREAS */
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .hidden { display: none !important; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #111; padding: 40px; border-radius: 12px; border: 1px solid #333; text-align: center; }

        /* EDITOR STYLES */
        .editor-container { display: grid; grid-template-columns: 1fr 400px; gap: 30px; }
        .form-edit { background: #111; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .btn-save { background: #00e5ff; color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: 700; cursor: pointer; width: 100%; }
        
        /* PREVIEW WINDOW */
        .preview-window { border: 10px solid #222; border-radius: 20px; height: 600px; overflow: hidden; background: #fff; position: sticky; top: 0; }
        iframe { width: 100%; height: 100%; border: none; }

        /* QUEUE TABLE */
        table { width: 100%; border-collapse: collapse; background: #111; border-radius: 10px; overflow: hidden; }
        th { background: #1a1a1a; padding: 15px; text-align: left; color: #666; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .status-pill { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="color:#00e5ff; letter-spacing:5px; margin-bottom:20px;">ADMIN</h1>
            <input type="password" id="pass" placeholder="CHAVE">
            <button class="btn-save" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <nav>
        <button id="btn-nav-fila" class="active" onclick="showTab('fila')">📋</button>
        <button id="btn-nav-edit" onclick="showTab('edit')">🎨</button>
        <button onclick="location.reload()">🚪</button>
    </nav>

    <main id="tab-fila">
        <h1 style="margin-bottom:20px">Fila de Atendimento</h1>
        <table>
            <thead><tr><th>Paciente</th><th>Motivo</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="lista-fila"></tbody>
        </table>
    </main>

    <main id="tab-edit" class="hidden">
        <div class="editor-container">
            <div class="form-edit">
                <h1>🎨 Design do Site</h1>
                <label>Título Principal</label>
                <input type="text" id="conf-titulo" oninput="saveConfig()">
                <label>Subtítulo</label>
                <textarea id="conf-subtitulo" oninput="saveConfig()"></textarea>
                
                <hr style="margin:20px 0; border:#333">
                
                <h3>Serviços (JSON)</h3>
                <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">Edite o nome e preço abaixo:</p>
                <textarea id="conf-servicos" style="height: 300px; font-family: monospace;" oninput="saveConfig()"></textarea>
            </div>
            
            <div>
                <h3>Visualização Real</h3>
                <div class="preview-window">
                    <iframe src="https://l3supermax12.github.io/Cliente-servidor/" id="preview-frame"></iframe>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDAAl2ziqrALH6R1lzgzTX3kDJ6TdVcVIM",
            authDomain: "clinica-cliente.firebaseapp.com",
            projectId: "clinica-cliente",
            storageBucket: "clinica-cliente.firebasestorage.app",
            messagingSenderId: "151834590720",
            appId: "1:151834590720:web:40dc91b2b88dc65d9922e5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // LOGIN
        window.login = () => {
            if(document.getElementById('pass').value === "1704") {
                document.getElementById('login-screen').classList.add('hidden');
                loadData();
            }
        };

        // NAVEGAÇÃO
        window.showTab = (tab) => {
            document.getElementById('tab-fila').classList.add('hidden');
            document.getElementById('tab-edit').classList.add('hidden');
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-nav-${tab}`).classList.add('active');
            
            // Recarrega o preview ao abrir a aba
            if(tab === 'edit') document.getElementById('preview-frame').src += '';
        };

        function loadData() {
            // Sincroniza Fila
            onValue(ref(db, 'agendamentos'), (snapshot) => {
                const list = document.getElementById('lista-fila');
                list.innerHTML = "";
                const data = snapshot.val();
                if(data) {
                    Object.entries(data).forEach(([id, p]) => {
                        if(p.status === "Concluído") return;
                        list.innerHTML += `
                            <tr>
                                <td>${p.nome}</td>
                                <td>${p.motivo}</td>
                                <td><span class="status-pill" style="background:${p.status==='Pendente'?'#333':'#00e5ff'}; color:${p.status==='Pendente'?'#aaa':'#000'}">${p.status}</span></td>
                                <td>
                                    <button onclick="window.att('${id}', '${p.status==='Pendente'?'Em Atendimento':'Concluído'}')">✅</button>
                                    <button onclick="window.del('${id}')">❌</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            });

            // Carrega Configurações no Editor
            onValue(ref(db, 'configuracoes'), (snapshot) => {
                const c = snapshot.val();
                if(c) {
                    document.getElementById('conf-titulo').value = c.titulo;
                    document.getElementById('conf-subtitulo').value = c.subtitulo;
                    document.getElementById('conf-servicos').value = JSON.stringify(c.servicos, null, 2);
                }
            });
        }

        window.att = (id, status) => update(ref(db, `agendamentos/${id}`), { status });
        window.del = (id) => remove(ref(db, `agendamentos/${id}`));

        // SALVAR CONFIGURAÇÕES AO DIGITAR
        window.saveConfig = () => {
            try {
                const servicos = JSON.parse(document.getElementById('conf-servicos').value);
                update(ref(db, 'configuracoes'), {
                    titulo: document.getElementById('conf-titulo').value,
                    subtitulo: document.getElementById('conf-subtitulo').value,
                    servicos: servicos
                });
            } catch(e) { 
                // Evita erro enquanto o usuário digita o JSON
            }
        };
    </script>
</body>
</html>
