<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Smile | Designer Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root { --accent: #00e5ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; }

        /* BARRA LATERAL DE FERRAMENTAS */
        .toolbar { width: 300px; height: 100vh; background: #111; border-right: 1px solid #333; padding: 20px; overflow-y: auto; z-index: 100; }
        .toolbar h2 { font-size: 1rem; color: var(--accent); margin-bottom: 20px; letter-spacing: 2px; }
        
        .tool-group { margin-bottom: 25px; background: #1a1a1a; padding: 15px; border-radius: 8px; }
        .tool-group label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        
        input[type="color"], input[type="text"], select { width: 100%; padding: 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; margin-bottom: 10px; }

        /* ÁREA DE TRABALHO (PREVIEW VIVO) */
        .workspace { flex: 1; height: 100vh; overflow-y: auto; background: #050505; padding: 40px; position: relative; }
        
        /* ELEMENTOS EDITÁVEIS (Simulando o Site) */
        .editable-canvas { 
            background: #0a0a0a; 
            min-height: 100%; 
            border-radius: 20px; 
            padding: 40px; 
            border: 2px dashed #333;
        }

        .edit-hero { text-align: center; margin-bottom: 50px; cursor: pointer; padding: 20px; border-radius: 10px; transition: 0.2s; }
        .edit-hero:hover { background: rgba(0,229,255,0.05); outline: 1px solid var(--accent); }

        /* GRID DE SERVIÇOS ARRASTÁVEL */
        .edit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .edit-card { 
            background: #111; border: 1px solid #222; padding: 20px; border-radius: 12px; 
            cursor: grab; position: relative; transition: 0.3s;
        }
        .edit-card:active { cursor: grabbing; }
        .edit-card:hover { border-color: var(--accent); }
        
        .btn-add { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        .save-bar { position: fixed; bottom: 20px; left: 320px; right: 20px; background: #00e5ff; color: #000; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 10px 30px rgba(0,229,255,0.3); z-index: 1000; }
        .btn-publish { background: #000; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="toolbar">
        <h2>DESIGNER PRO</h2>
        
        <div class="tool-group">
            <label>Cores da Marca</label>
            <input type="color" id="theme-color" value="#00e5ff" onchange="updateTheme()">
            <label>Fundo do Site</label>
            <input type="color" id="bg-color" value="#0a0a0a" onchange="updateTheme()">
        </div>

        <div class="tool-group">
            <label>Animação de Entrada</label>
            <select id="anim-type">
                <option value="animate__fadeIn">Suave</option>
                <option value="animate__bounceIn">Salto</option>
                <option value="animate__slideInUp">Subir</option>
            </select>
        </div>

        <p style="font-size: 0.7rem; color: #555;">DICA: Arraste os cards de serviço para mudar a ordem no site do cliente.</p>
    </div>

    <div class="workspace">
        <div class="editable-canvas" id="canvas">
            <div class="edit-hero animate__animated" id="hero-area" onclick="editText('hero')">
                <h1 id="view-titulo">Dr. Smile</h1>
                <p id="view-subtitulo">Clique aqui para editar este texto</p>
            </div>

            <div class="edit-grid" id="services-sortable">
                </div>
            
            <button class="btn-add" onclick="addNewService()">+</button>
        </div>
    </div>

    <div class="save-bar">
        <span>Você tem alterações não publicadas!</span>
        <button class="btn-publish" onclick="publishSite()">PUBLICAR SITE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE (IGUAL À ANTERIOR)
        const firebaseConfig = {
            apiKey: "AIzaSyDAAl2ziqrALH6R1lzgzTX3kDJ6TdVcVIM",
            authDomain: "clinica-cliente.firebaseapp.com",
            projectId: "clinica-cliente",
            storageBucket: "clinica-cliente.firebasestorage.app",
            messagingSenderId: "151834590720",
            appId: "1:151834590720:web:40dc91b2b88dc65d9922e5"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let siteData = {
            configuracoes: {
                titulo: "Dr. Smile",
                subtitulo: "Clínica Premium",
                tema: "#00e5ff",
                animacao: "animate__fadeIn",
                servicos: []
            }
        };

        // CARREGAR DADOS
        onValue(ref(db, 'configuracoes'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                siteData.configuracoes = data;
                renderCanvas();
            }
        });

        function renderCanvas() {
            document.getElementById('view-titulo').innerText = siteData.configuracoes.titulo;
            document.getElementById('view-subtitulo').innerText = siteData.configuracoes.subtitulo;
            
            const grid = document.getElementById('services-sortable');
            grid.innerHTML = "";
            
            const servicos = siteData.configuracoes.servicos || [];
            servicos.forEach((s, index) => {
                grid.innerHTML += `
                    <div class="edit-card animate__animated ${siteData.configuracoes.animacao}" data-id="${index}">
                        <div onclick="editService(${index})">
                            <div style="font-size:2rem">${s.emoji}</div>
                            <div style="font-weight:bold">${s.nome}</div>
                            <div style="color:var(--accent)">R$ ${s.preco}</div>
                        </div>
                        <button onclick="removeService(${index})" style="position:absolute; top:5px; right:5px; background:none; border:none; color:red; cursor:pointer;">×</button>
                    </div>
                `;
            });

            // ATIVAR ARRASTAR E SOLTAR
            new Sortable(grid, {
                animation: 150,
                onEnd: function() {
                    const newOrder = [];
                    document.querySelectorAll('.edit-card').forEach(el => {
                        newOrder.push(servicos[el.dataset.id]);
                    });
                    siteData.configuracoes.servicos = newOrder;
                }
            });
        }

        // FUNÇÕES DE EDIÇÃO
        window.editText = (type) => {
            if(type === 'hero') {
                const n = prompt("Novo Título:", siteData.configuracoes.titulo);
                const s = prompt("Novo Subtítulo:", siteData.configuracoes.subtitulo);
                if(n) siteData.configuracoes.titulo = n;
                if(s) siteData.configuracoes.subtitulo = s;
            }
            renderCanvas();
        };

        window.addNewService = () => {
            const nome = prompt("Nome do Serviço:");
            if(nome) {
                if(!siteData.configuracoes.servicos) siteData.configuracoes.servicos = [];
                siteData.configuracoes.servicos.push({ nome, preco: "0", desc: "", emoji: "🦷" });
                renderCanvas();
            }
        };

        window.publishSite = () => {
            set(ref(db, 'configuracoes'), siteData.configuracoes)
                .then(() => alert("Site Atualizado com Sucesso!"));
        };

        window.updateTheme = () => {
            const color = document.getElementById('theme-color').value;
            document.documentElement.style.setProperty('--accent', color);
            siteData.configuracoes.tema = color;
        };

    </script>
</body>
</html>
